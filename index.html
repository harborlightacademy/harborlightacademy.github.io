<style>
    /* ── Homepage-specific overrides ────────────────────────────
       These styles apply only to the full-viewport hero on the
       home page and are not part of the shared style.css.
    ─────────────────────────────────────────────────────────── */

    /* Home page needs a dark background behind the hero */
    html, body { height: 100%; }
    body {
      background: var(--navy-dark);
      color: var(--white);
    }

    /* Full-viewport hero section */
    .hero {
      position: relative;
      flex: 1;
      min-height: calc(100svh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('images/hero.jpg');
      background-size: cover;
      background-position: center 35%;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(16, 20, 53, 0.50) 0%,
        rgba(16, 20, 53, 0.68) 55%,
        rgba(16, 20, 53, 0.88) 100%
      );
    }
    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px 64px;
    }
    .hero-logo {
      width: clamp(190px, 28vw, 280px);
      height: auto;
      filter: drop-shadow(0 6px 28px rgba(0,0,0,0.6));
      margin-bottom: 28px;
    }
    .hero-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      color: var(--gold-light);
      letter-spacing: 0.06em;
      margin-bottom: 52px;
    }

    /* Hero CTA buttons */
    .hero-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }
    .hero-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .hero-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }
    .hero-link.gold {
      background: var(--gold);
      color: var(--navy-dark);
    }
    .hero-link.gold:hover { background: var(--gold-light); }
    .hero-link.glass {
      background: rgba(255,255,255,0.09);
      color: var(--white);
      border: 1.5px solid rgba(201,168,76,0.45);
      backdrop-filter: blur(6px);
    }
    .hero-link.glass:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--gold);
    }
    .hero-link .arrow { opacity: 0.75; }

    /* Responsive hero buttons */
    @media (min-width: 600px) {
      .hero-links {
        flex-direction: row;
        max-width: 680px;
        gap: 16px;
      }
      .hero-link {
        flex: 1;
        justify-content: center;
        gap: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-link { transition: none; }
    }

    /* Push mobile nav close button below the fixed navbar */
    .mobile-nav-close {
      margin-top: 64px !important;
    }

    /* Facebook icon in nav */
    .nav-fb {
      display: flex !important;
      align-items: center;
      padding: 8px 10px !important;
      color: rgba(255,255,255,0.65) !important;
      transition: color 0.15s !important;
    }
    .nav-fb:hover { color: #1877F2 !important; background: rgba(255,255,255,0.08) !important; }
  </style>
</head>
<body>

<!-- Navigation -->
<div id="nav-placeholder"></div>

<!-- ── HERO ───────────────────────────────────────────────────── -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <img src="images/logo.jpg" alt="Harbor Light Academy" class="hero-logo" />
    <p class="hero-tagline">Lighting the Way &mdash; Mind &middot; Heart &middot; Spirit</p>
    <nav class="hero-links" aria-label="Quick links">
      <a href="faculty.html" class="hero-link glass">
        Our Team <span class="arrow">→</span>
      </a>
      <a href="application.html" class="hero-link gold">
        Apply <span class="arrow">→</span>
      </a>
      <a href="giving.html" class="hero-link glass">
        Give <span class="arrow">→</span>
      </a>
    </nav>
  </div>
</section>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script>
  function loadPartial(id, file) {
    fetch(file)
      .then(r => r.text())
      .then(html => { document.getElementById(id).innerHTML = html; })
      .catch(() => console.warn('Could not load partial:', file));
  }
  loadPartial('nav-placeholder',    'navigation.html');
  loadPartial('footer-placeholder', 'footer.html');

  document.addEventListener('click', e => {
    const btn = e.target.closest('#navLinks button');
    if (btn) {
      const li = btn.parentElement;
      const isOpen = li.classList.contains('open');
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) li.classList.add('open');
      return;
    }
    if (!e.target.closest('#navLinks'))
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      closeMobileNav();
    }
  });
  function openMobileNav()  { document.getElementById('mobileNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow = '';       }
</script>
</body>
</html>
