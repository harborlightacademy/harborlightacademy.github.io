<style>
    /* ── Homepage-specific overrides ────────────────────────────
       These styles apply only to the full-viewport hero on the
       home page and are not part of the shared style.css.
    ─────────────────────────────────────────────────────────── */

    /* Home page needs a dark background behind the hero */
    html, body { height: 100%; }
    body {
      background: var(--navy-dark);
      color: var(--white);
    }

    /* Full-viewport hero section */
    .hero {
      position: relative;
      flex: 1;
      min-height: calc(100svh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('images/hero.jpg');
      background-size: cover;
      background-position: center 35%;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(16, 20, 53, 0.50) 0%,
        rgba(16, 20, 53, 0.68) 55%,
        rgba(16, 20, 53, 0.88) 100%
      );
    }
    .hero-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 48px 24px 64px;
    }
    .hero-logo {
      width: clamp(190px, 28vw, 280px);
      height: auto;
      filter: drop-shadow(0 6px 28px rgba(0,0,0,0.6));
      margin-bottom: 28px;
    }
    .hero-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      color: var(--gold-light);
      letter-spacing: 0.06em;
      margin-bottom: 52px;
    }

    /* Hero CTA buttons */
    .hero-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }
    .hero-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .hero-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }
    .hero-link.gold {
      background: var(--gold);
      color: var(--navy-dark);
    }
    .hero-link.gold:hover { background: var(--gold-light); }
    .hero-link.glass {
      background: rgba(255,255,255,0.09);
      color: var(--white);
      border: 1.5px solid rgba(201,168,76,0.45);
      backdrop-filter: blur(6px);
    }
    .hero-link.glass:hover {
      background: rgba(255,255,255,0.15);
      border-color: var(--gold);
    }
    .hero-link .arrow { opacity: 0.75; }

    /* Responsive hero buttons */
    @media (min-width: 600px) {
      .hero-links {
        flex-direction: row;
        max-width: 680px;
        gap: 16px;
      }
      .hero-link {
        flex: 1;
        justify-content: center;
        gap: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-link { transition: none; }
    }

    /* Push mobile nav close button below the fixed navbar */
    .mobile-nav-close {
      margin-top: 64px !important;
    }

    /* Facebook icon in nav */
    .nav-fb {
      display: flex !important;
      align-items: center;
      padding: 8px 10px !important;
      color: rgba(255,255,255,0.65) !important;
      transition: color 0.15s !important;
    }
    .nav-fb:hover { color: #1877F2 !important; background: rgba(255,255,255,0.08) !important; }
  </style>
</head>
<!-- ── RECRUITING EVENT POPUP ───────────────────────────────── -->
<!-- Paste this block just before the closing </body> tag on the homepage -->

<style>
  #event-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #event-overlay.active {
    display: flex;
  }
  #event-popup {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    position: relative;
    animation: popupFadeIn 0.3s ease;
  }
  @keyframes popupFadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #event-popup img {
    width: 100%;
    height: auto;
    display: block;
  }
  #event-popup-footer {
    padding: 1rem 1.25rem 1.25rem;
    text-align: center;
    font-family: 'Source Sans 3', sans-serif;
    background: var(--navy, #1a2e4a);
  }
  #event-popup-footer p {
    color: #fff;
    font-size: 0.85rem;
    margin: 0 0 0.75rem;
    opacity: 0.85;
  }
  #popup-close-btn {
    display: inline-block;
    padding: 0.55rem 1.75rem;
    background: var(--gold, #c9a84c);
    color: #fff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #popup-close-btn:hover { opacity: 0.85; }
  #popup-dismiss {
    position: absolute;
    top: 8px;
    right: 10px;
    background: rgba(0,0,0,0.45);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #popup-dismiss:hover { background: rgba(0,0,0,0.7); }
</style>

<div id="event-overlay" role="dialog" aria-modal="true" aria-label="Upcoming Event">
  <div id="event-popup">
    <button id="popup-dismiss" onclick="closeEventPopup()" aria-label="Close">&times;</button>
    <img
      src="images/popcorn-social-flier.jpg"
      alt="A Popcorn Social — Tuesday, July 7th from 4–6 PM at Harbor Light Academy"
    />
    <div id="event-popup-footer">
      <p>We'd love to see you there!</p>
      <button id="popup-close-btn" onclick="closeEventPopup()">Got it, thanks!</button>
    </div>
  </div>
</div>

<script>
  // Show popup after 2.5 seconds; close on overlay click or button click
  setTimeout(function () {
    document.getElementById('event-overlay').classList.add('active');
  }, 1500);

  function closeEventPopup() {
    document.getElementById('event-overlay').classList.remove('active');
  }

  // Close if user clicks the dark backdrop
  document.getElementById('event-overlay').addEventListener('click', function (e) {
    if (e.target === this) closeEventPopup();
  });

  // Close on Escape key
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeEventPopup();
  });
</script>
<!-- ── END RECRUITING EVENT POPUP ───────────────────────────── -->
  <body>

<!-- Navigation -->
<div id="nav-placeholder"></div>

<!-- ── HERO ───────────────────────────────────────────────────── -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <img src="images/logo.jpg" alt="Harbor Light Academy" class="hero-logo" />
    <p class="hero-tagline">Lighting the Way &mdash; Mind &middot; Heart &middot; Spirit</p>
    <nav class="hero-links" aria-label="Quick links">
      <a href="faculty.html" class="hero-link glass">
        Our Team <span class="arrow">→</span>
      </a>
      <a href="application.html" class="hero-link gold">
        Apply <span class="arrow">→</span>
      </a>
      <a href="giving.html" class="hero-link glass">
        Give <span class="arrow">→</span>
      </a>
    </nav>
  </div>
</section>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script>
  function loadPartial(id, file) {
    fetch(file)
      .then(r => r.text())
      .then(html => { document.getElementById(id).innerHTML = html; })
      .catch(() => console.warn('Could not load partial:', file));
  }
  loadPartial('nav-placeholder',    'navigation.html');
  loadPartial('footer-placeholder', 'footer.html');

  document.addEventListener('click', e => {
    const btn = e.target.closest('#navLinks button');
    if (btn) {
      const li = btn.parentElement;
      const isOpen = li.classList.contains('open');
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) li.classList.add('open');
      return;
    }
    if (!e.target.closest('#navLinks'))
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      closeMobileNav();
    }
  });
  function openMobileNav()  { document.getElementById('mobileNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow = '';       }
</script>
</body>
</html>
