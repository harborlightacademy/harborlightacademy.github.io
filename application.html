<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application — Harbor Light Academy</title>
  <meta name="description" content="Apply to Harbor Light Academy — a Christian school in Smithfield, VA nurturing the mind, heart, and spirit." />
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "102f3471d64744a490f6c7a74d954b9e"}'></script>
  <!-- End Cloudflare Web Analytics --> <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Intro copy above the form */
    .apply-intro {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      font-size: 1.05rem;
      color: var(--slate);
      line-height: 1.65;
      margin: 0 0 32px;
    }
    .apply-intro a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .apply-intro a:hover { text-decoration: underline; }

    /* Jotform embed card */
    .jotform-card {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.13);
      border: 1px solid rgba(26,32,80,0.1);
      background: #ffffff;
    }
    .jotform-card iframe {
      display: block;
      width: 100%;
      min-height: 1400px;
      border: none;
    }
    .jotform-fallback {
      text-align: center;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      color: rgba(26,32,80,0.55);
      margin-top: 18px;
    }
    .jotform-fallback a { color: var(--gold); font-weight: 700; text-decoration: none; }
    .jotform-fallback a:hover { text-decoration: underline; }

    /* Nav extras */
    .mobile-nav-close { margin-top: 64px !important; }
    .nav-fb {
      display: flex !important;
      align-items: center;
      padding: 8px 10px !important;
      color: rgba(255,255,255,0.65) !important;
      transition: color 0.15s !important;
    }
    .nav-fb:hover { color: #1877F2 !important; background: rgba(255,255,255,0.08) !important; }
  </style>
</head>
<body>

<script>
  // Mark the active nav link for this page after nav is injected
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.dropdown a[href="application.html"]').forEach(a => a.classList.add('active'));
  });
</script>

<!-- Navigation -->
<div id="nav-placeholder"></div>

<!-- ── PAGE HERO ──────────────────────────────────────────────── -->
<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-text">
    <p class="eyebrow">Admissions</p>
    <h1>Application 2026–27</h1>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────────── -->
<main>

  <div class="section-label">Apply Online</div>

  <p class="apply-intro">
    Complete the application below to begin the admissions process for the 2026–27 school year.
    Questions along the way? Reach out to
    <a href="mailto:admissions@harborlightacademy.com">admissions@harborlightacademy.com</a>
    or <a href="tel:7576960900">(757) 696-0900</a>.
  </p>

  <div class="jotform-card">
    <iframe
      id="JotFormIFrame-260615105551145"
      title="Harbor Light Academy Application 2026–27"
      onload="window.parent.scrollTo(0,0)"
      allowtransparency="true"
      allow="geolocation; microphone; camera; fullscreen"
      src="https://form.jotform.com/260615105551145"
      frameborder="0"
      style="min-width:100%;height:1400px;border:none;"
      scrolling="no">
    </iframe>
  </div>

  <p class="jotform-fallback">
    Having trouble viewing the form? <a href="https://form.jotform.com/260615105551145" target="_blank" rel="noopener noreferrer">Open it in a new tab →</a>
  </p>

  <script src="https://cdn.jotfor.ms/s/umd/latest/for-form-embed-handler.js"></script>
  <script>
    window.jotformEmbedHandler("iframe[id='JotFormIFrame-260615105551145']", "https://form.jotform.com/");
  </script>

</main>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script>
  // Load shared navigation and footer partials
  function loadPartial(id, file) {
    fetch(file)
      .then(r => r.text())
      .then(html => { document.getElementById(id).innerHTML = html; })
      .catch(() => console.warn('Could not load partial:', file));
  }
  loadPartial('nav-placeholder',    'navigation.html');
  loadPartial('footer-placeholder', 'footer.html');

  // Nav dropdown logic (runs after partial loads via event delegation)
  document.addEventListener('click', e => {
    const btn = e.target.closest('#navLinks button');
    if (btn) {
      const li = btn.parentElement;
      const isOpen = li.classList.contains('open');
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) li.classList.add('open');
      return;
    }
    if (!e.target.closest('#navLinks'))
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      closeMobileNav();
    }
  });

  function openMobileNav()  { document.getElementById('mobileNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow = '';       }
</script>
</body>
</html>
