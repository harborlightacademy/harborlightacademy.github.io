<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application — Harbor Light Academy</title>
  <meta name="description" content="Apply to Harbor Light Academy — a Christian school in Smithfield, VA nurturing the mind, heart, and spirit." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* PDF card */
    .pdf-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--gold-pale);
      border: 1.5px solid rgba(201,168,76,0.35);
      border-radius: 10px;
      padding: 22px 28px;
      margin-bottom: 40px;
      text-decoration: none;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .pdf-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }
    .pdf-icon {
      width: 44px;
      height: 44px;
      background: var(--navy);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .pdf-card-text strong {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--navy-dark);
      margin-bottom: 2px;
    }
    .pdf-card-text span {
      font-size: 0.82rem;
      color: rgba(26,32,80,0.6);
    }

    /* PDF viewer */
    .pdf-viewer-wrap {
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.13);
      border: 1px solid rgba(26,32,80,0.1);
      background: #525659;
    }
    .pdf-viewer-wrap iframe {
      display: block;
      width: 100%;
      height: 900px;
      border: none;
    }
    .pdf-fallback {
      padding: 48px 32px;
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.92rem;
    }
    .pdf-fallback a { color: var(--gold); font-weight: 700; }

    @media (max-width: 640px) {
      .pdf-viewer-wrap iframe { height: 600px; }
    }

    /* Nav extras */
    .mobile-nav-close { margin-top: 64px !important; }
    .nav-fb {
      display: flex !important;
      align-items: center;
      padding: 8px 10px !important;
      color: rgba(255,255,255,0.65) !important;
      transition: color 0.15s !important;
    }
    .nav-fb:hover { color: #1877F2 !important; background: rgba(255,255,255,0.08) !important; }
  </style>
</head>
<body>

<script>
  // Mark the active nav link for this page after nav is injected
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.dropdown a[href="application.html"]').forEach(a => a.classList.add('active'));
  });
</script>

<!-- Navigation -->
<div id="nav-placeholder"></div>

<!-- ── PAGE HERO ──────────────────────────────────────────────── -->
<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-text">
    <p class="eyebrow">Admissions</p>
    <h1>Application 2026–27</h1>
  </div>
</div>

<!-- ── MAIN ───────────────────────────────────────────────────── -->
<main>

  <div class="section-label">Download &amp; Print</div>

  <a href="https://img1.wsimg.com/blobby/go/d5eb1ff2-2716-43f2-9f5a-33c0b954b636/HLA%20Application.pdf"
     target="_blank" rel="noopener noreferrer" class="pdf-card" download>
    <div class="pdf-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="color:var(--gold)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    </div>
    <div class="pdf-card-text">
      <strong>HLA Application 2026–27 (PDF)</strong>
      <span>Download, print, and return to admissions@harborlightacademy.com</span>
    </div>
  </a>

  <div class="pdf-viewer-wrap">
    <iframe
      src="https://img1.wsimg.com/blobby/go/d5eb1ff2-2716-43f2-9f5a-33c0b954b636/HLA%20Application.pdf"
      title="Harbor Light Academy Application 2026–27"
      aria-label="Application PDF viewer">
      <div class="pdf-fallback">
        Your browser does not support embedded PDFs.
        <a href="https://img1.wsimg.com/blobby/go/d5eb1ff2-2716-43f2-9f5a-33c0b954b636/HLA%20Application.pdf" target="_blank" rel="noopener noreferrer">Open the PDF directly →</a>
      </div>
    </iframe>
  </div>

</main>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script>
  // Load shared navigation and footer partials
  function loadPartial(id, file) {
    fetch(file)
      .then(r => r.text())
      .then(html => { document.getElementById(id).innerHTML = html; })
      .catch(() => console.warn('Could not load partial:', file));
  }
  loadPartial('nav-placeholder',    'navigation.html');
  loadPartial('footer-placeholder', 'footer.html');

  // Nav dropdown logic (runs after partial loads via event delegation)
  document.addEventListener('click', e => {
    const btn = e.target.closest('#navLinks button');
    if (btn) {
      const li = btn.parentElement;
      const isOpen = li.classList.contains('open');
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) li.classList.add('open');
      return;
    }
    if (!e.target.closest('#navLinks'))
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      closeMobileNav();
    }
  });

  function openMobileNav()  { document.getElementById('mobileNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow = '';       }
</script>
</body>
</html>
