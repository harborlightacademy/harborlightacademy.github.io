<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers — Harbor Light Academy</title>
  <meta name="description" content="Join the Harbor Light Academy team. Apply for open positions and help us light the way for students in Smithfield, VA." />
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "102f3471d64744a490f6c7a74d954b9e"}'></script>
  <!-- End Cloudflare Web Analytics --> 
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #ffffff; color: #111111; }

    .careers-intro {
      max-width: 640px;
      margin: 0 auto 56px;
      text-align: center;
    }
    .careers-intro p {
      font-size: 1.02rem;
      line-height: 1.8;
      color: #444;
    }

    .form-wrap {
      border: 1px solid rgba(26,32,80,0.1);
      border-top: 3px solid var(--gold);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(26,32,80,0.07);
    }
    .form-wrap iframe {
      display: block;
      width: 100%;
      min-height: 800px;
      border: none;
    }

    .mobile-nav-close { margin-top: 64px !important; }
    .nav-fb {
      display: flex !important;
      align-items: center;
      padding: 8px 10px !important;
      color: rgba(255,255,255,0.65) !important;
      transition: color 0.15s !important;
    }
    .nav-fb:hover { color: #1877F2 !important; background: rgba(255,255,255,0.08) !important; }
  </style>
</head>
<body>

<!-- Navigation -->
<div id="nav-placeholder"></div>

<!-- ── PAGE HERO ──────────────────────────────────────────────── -->
<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-text">
    <p class="eyebrow">Join Our Team</p>
    <h1>Careers</h1>
  </div>
</div>

<!-- ── MAIN CONTENT ───────────────────────────────────────────── -->
<main>

  <div class="careers-intro">
    <p>We are always looking for passionate, mission-driven educators and staff to join the Harbor Light Academy family. If you feel called to nurture the minds, hearts, and spirits of students in a Christian school environment, we'd love to hear from you.</p>
  </div>

  <p class="section-label">Employment Application</p>

  <div class="form-wrap">
    <iframe
      src="https://form.jotform.com/260747985955074"
      title="Harbor Light Academy Employment Application"
      allowfullscreen
      allow="geolocation; microphone; camera"
      scrolling="yes"
    ></iframe>
  </div>

</main>

<!-- Footer -->
<div id="footer-placeholder"></div>

<script>
  function loadPartial(id, file) {
    fetch(file)
      .then(r => r.text())
      .then(html => { document.getElementById(id).innerHTML = html; })
      .catch(() => console.warn('Could not load partial:', file));
  }
  loadPartial('nav-placeholder',    'navigation.html');
  loadPartial('footer-placeholder', 'footer.html');

  document.addEventListener('click', e => {
    const btn = e.target.closest('#navLinks button');
    if (btn) {
      const li = btn.parentElement;
      const isOpen = li.classList.contains('open');
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) li.classList.add('open');
      return;
    }
    if (!e.target.closest('#navLinks'))
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.querySelectorAll('#navLinks > li.open').forEach(el => el.classList.remove('open'));
      closeMobileNav();
    }
  });

  function openMobileNav()  { document.getElementById('mobileNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow = '';       }

  // Auto-resize iframe to fit JotForm content
  window.addEventListener('message', function(e) {
    if (typeof e.data === 'object' && e.data.action === 'setHeight') {
      const iframe = document.querySelector('.form-wrap iframe');
      if (iframe) iframe.style.minHeight = e.data.height + 'px';
    }
  });
</script>

</body>
</html>
